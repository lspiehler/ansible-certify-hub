---
# Worked example: derive a reachable FQDN from each instance's display title,
# split Windows vs Linux for connection settings, group by OS / status / tags,
# and only surface instances that are currently connected.
plugin: lspiehler.certify_hub.instances
url: https://ctw.example.org

# Credentials are read from the environment by default (CERTIFY_HUB_CLIENT_ID /
# CERTIFY_HUB_CLIENT_SECRET). You can also template them in explicitly:
# client_id: "{{ lookup('ansible.builtin.env', 'CERTIFY_HUB_CLIENT_ID') }}"
# client_secret: "{{ lookup('ansible.builtin.env', 'CERTIFY_HUB_CLIENT_SECRET') }}"

# TLS verification is on by default and works with a publicly-trusted (e.g.
# Let's Encrypt) Hub certificate. For an internal CA, point at a CA bundle:
# ca_path: /etc/pki/tls/certs/internal-ca.pem
# ...or, as a last resort (insecure), disable verification:
# validate_certs: false

# Only include instances the Hub currently considers connected. Note the Hub
# reports connectionStatus in lower case (e.g. "connected"), so compare with
# | lower to stay robust.
filters:
  - "connectionStatus | lower == 'connected'"

# displayTitle is the instance's short machine name (e.g. WEB01), not an FQDN.
# Keep the inventory hostname short and append your domain suffix to build a
# resolvable ansible_host. (To make the FQDN the inventory hostname instead, use
# hostnames: ["displayTitle ~ '.example.org'"].)
hostnames:
  - displayTitle
compose:
  ansible_host: "displayTitle ~ '.example.org'"
  ansible_connection: "'winrm' if 'windows' in (os | default('') | lower) else 'ssh'"

# Groups: os_windows / os_linux, status_connected, plus a tag-driven group such
# as env_production from a Certify tag whose categoryKey is 'environment'.
keyed_groups:
  - key: os
    prefix: os
    separator: "_"
  - key: connectionStatus
    prefix: status
  - key: tags_by_category.environment
    prefix: env
groups:
  windows: "'windows' in (os | default('') | lower)"
  linux: "'linux' in (os | default('') | lower)"
